<!--
  * Propósito: Panel administrativo de gestión de contactos.
  * Funcionalidad: Listado, búsqueda, edición y exportación de contactos a PDF.
  * Notas: Requiere autenticación JWT para visualizar los datos.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Contactos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Scripts para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <span class="logo-text">ANTIGRAVITY</span>
                </div>
                <button id="menuToggle" class="menu-toggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text" data-i18n="menu_register">Registro de Contacto</span>
                </a>
                <a href="panel.html" class="nav-link active">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text" data-i18n="menu_view">Ver Contactos</span>
                </a>
                <a href="graficos.html" class="nav-link">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text" data-i18n="menu_charts">Gráficos</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-switch">
                    <button id="themeToggle" class="btn-theme" data-i18n="theme_light">Claro</button>
                    <button id="langToggle" class="btn-lang">🇬🇧 EN</button>
                </div>
                <button id="logoutBtn" class="btn-logout" data-i18n="logout">Salir</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="breadcrumb">
                    <span id="locPrefix">Ubicación: </span> <span class="active-page" data-i18n="loc_panel">Panel de Registros</span>
                </div>
            </header>

            <div class="panel-container">
                <div class="panel-header glass-card">
                    <div class="panel-info">
                        <h2 data-i18n="panel_title">Registros</h2>
                        <p data-i18n="panel_desc">Lista de contactos almacenados en la base de datos.</p>
                    </div>
                    <div class="panel-actions">
                        <div class="search-box">
                            <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="Buscar contacto...">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>
                        <button class="btn-pdf-export" onclick="prepararImpresion()">
                            <span data-i18n="btn_pdf">PDF</span>
                        </button>
                    </div>
                </div>

                <div class="table-wrapper glass-card">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th onclick="sortTable('Id')">ID ↕</th>
                                <th onclick="sortTable('Nombre')" data-i18n="th_name">Nombre Completo ↕</th>
                                <th onclick="sortTable('Email')">Email ↕</th>
                                <th onclick="sortTable('FechaCreacion')" data-i18n="th_date">Fecha de Registro ↕</th>
                                <th data-i18n="th_status">Estado</th>
                                <th data-i18n="th_actions">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="contactTableBody">
                            <!-- Datos dinámicos aquí -->
                        </tbody>
                    </table>
                    <div class="pagination-footer">
                        <div id="totalRegistrosText" class="total-count">Total: 0 registro(s)</div>
                        <div id="paginationControls" class="pagination-btns"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Edición -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content glass-card">
            <div class="form-header">
                <h2 data-i18n="modal_title">Editar Registro</h2>
                <p data-i18n="modal_desc">Modifica los datos del contacto.</p>
            </div>
            <form id="editForm" class="contact-form">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label for="edit-nombre" data-i18n="lbl_name">Nombre</label>
                    <input type="text" id="edit-nombre" required>
                </div>
                <div class="input-group">
                    <label for="edit-apellidos" data-i18n="lbl_surname">Apellidos</label>
                    <input type="text" id="edit-apellidos" required>
                </div>
                <div class="input-group">
                    <label for="edit-email" data-i18n="lbl_email">Correo Electrónico</label>
                    <input type="email" id="edit-email" required>
                </div>
                <div class="modal-footer">
                    <button type="button" id="closeModalBtn" class="btn-secondary" data-i18n="btn_cancel">Cancelar</button>
                    <button type="submit" class="submit-btn">
                        <span class="btn-text" data-i18n="btn_save">Guardar Cambios</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/global.js"></script>
    <script src="/js/panel.js"></script>
</body>
</html>
